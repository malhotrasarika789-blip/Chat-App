<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Chat Room</title>
    <style>
        body { background: linear-gradient(135deg, #fce4ec, #f8bbd0); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-card { width: 90%; max-width: 400px; background: white; height: 80vh; display: flex; flex-direction: column; border-radius: 20px; box-shadow: 0 10px 25px rgba(233, 30, 99, 0.2); overflow: hidden; border: 2px solid #f8bbd0; }
        .header { background: #ec407a; padding: 20px; text-align: center; font-weight: bold; color: white; font-size: 1.2rem; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; list-style: none; display: flex; flex-direction: column; }
        #messages li { background: #fce4ec; margin-bottom: 12px; padding: 12px 15px; border-radius: 15px 15px 15px 0; width: fit-content; max-width: 80%; color: #880e4f; border-left: 4px solid #ec407a; }
        form { padding: 15px; background: #fff; display: flex; border-top: 1px solid #f8bbd0; }
        input { flex-grow: 1; background: #fff0f5; border: 1px solid #f8bbd0; padding: 12px; border-radius: 25px; outline: none; padding-left: 15px; }
        button { background: #d81b60; border: none; color: white; padding: 10px 20px; margin-left: 10px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ad1457; }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="header">🌸 Chat Room | Online: <span id="online-count">0</span></div>
    <ul id="messages"></ul>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="Type a message..." />
        <button>Send</button>
    </form>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const username = prompt("Enter your name:") || "User";

    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    const onlineCount = document.getElementById('online-count');

    socket.on('user-count', (count) => { onlineCount.innerText = count; });

    socket.on('chat-message', (data) => {
        const item = document.createElement('li');
        item.innerHTML = `<strong>${data.user}:</strong> ${data.text}`;
        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight;
    });

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (input.value) {
            socket.emit('chat-message', { user: username, text: input.value });
            input.value = '';
        }
    });
</script>
</body>
</html>
